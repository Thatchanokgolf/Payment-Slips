# Netlify deployment config.
# - The frontend (public/) is served as a static site.
# - Each file in netlify/functions/ becomes a serverless function; its own
#   `export const config = { path: "/api/..." }` defines the route, so the
#   existing /api/* fetch calls in the frontend work unchanged.

[build]
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

# `netlify dev` (npm run dev:netlify) — runs the static site + functions locally,
# loading env vars from .env. "#static" skips framework detection so it just
# serves the publish directory instead of trying to launch a dev command.
[dev]
  framework = "#static"
  publish = "public"
  port = 8888
